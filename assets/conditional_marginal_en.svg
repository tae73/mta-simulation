  <line x1="180" y1="146" x2="150" y2="206" stroke="#6b7280" stroke-width="2"/>
  <polygon points="143,197 156,200 148,209" fill="#6b7280"/>
  <line x1="272" y1="146" x2="350" y2="206" stroke="#6b7280" stroke-width="2"/>
