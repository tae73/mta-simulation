  <text x="498" y="300" font-size="12.5" fill="#2d3340">use — forward budget · A/B pre-estimate</text>
  <text x="498" y="326" font-size="12.5" font-weight="700" fill="#3340a8">matches GT_B (counterfactual) · MAE 0.020</text>

  <rect x="40" y="382" width="780" height="60" rx="10" fill="#f4f6fa" stroke="#cbd5e3" stroke-width="1.4"/>
  <text x="430" y="407" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1f2a44">Channel ranking agrees: Spearman &#961; = 1.000  (robust either way)</text>
