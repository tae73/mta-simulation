  <line x1="245" y1="234" x2="288" y2="234" stroke="#6b7280" stroke-width="2"/>
  <polygon points="282,228 282,240 291,234" fill="#6b7280"/>

  <text x="225" y="300" text-anchor="middle" font-size="11.5" font-style="italic" fill="#a23b34">« conditioning on conversion = collider bias »</text>
  <text x="225" y="322" text-anchor="middle" font-size="11" font-style="italic" fill="#9aa0ab">ambulances don't kill — the critically ill take them.</text>

  <line x1="455" y1="70" x2="455" y2="360" stroke="#e2e8f0" stroke-width="1.5"/>

  <rect x="480" y="78" width="345" height="124" rx="10" fill="#ffffff" stroke="#2ca58d" stroke-width="2"/>
  <rect x="480" y="78" width="345" height="30" rx="10" fill="#2ca58d"/>
  <text x="496" y="99" font-size="14.5" font-weight="700" fill="#ffffff">Conditional Shapley  (§4)</text>
  <text x="498" y="130" font-size="12.5" fill="#2d3340">aggregated over — converters only</text>
  <text x="498" y="152" font-size="12.5" fill="#2d3340">use — retrospective attribution audit</text>
  <text x="498" y="178" font-size="12.5" font-weight="700" fill="#1f8068">matches GT_A (sample intensity) · MAE 0.012</text>

  <rect x="480" y="226" width="345" height="124" rx="10" fill="#ffffff" stroke="#4c5bd4" stroke-width="2"/>
  <rect x="480" y="226" width="345" height="30" rx="10" fill="#4c5bd4"/>
  <text x="496" y="247" font-size="14.5" font-weight="700" fill="#ffffff">Marginal G-computation  (§10)</text>
